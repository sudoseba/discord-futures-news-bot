<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>Discord News Bot · Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%88%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="app" class="app" hidden>
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-mark">📈</div>
        <div>
          <div class="brand-name">News Bot</div>
          <div class="brand-sub">Dashboard</div>
        </div>
      </div>
      <nav id="nav"></nav>
      <div class="nav-spacer"></div>
      <div class="nav-foot" id="verFoot">v—</div>
    </aside>

    <div class="main">
      <header class="topbar">
        <button class="menu-btn" id="menuBtn" aria-label="Menu">☰</button>
        <h2 id="viewTitle">Overview</h2>
        <div class="topbar-spacer"></div>
        <span class="conn" id="conn"><span class="dot" id="connDot"></span><span id="connText">connecting…</span></span>
        <div class="user-chip" id="userChip"></div>
        <button class="btn-ghost" id="logoutBtn">Sign out</button>
      </header>
      <main class="content" id="view"></main>
    </div>
  </div>

  <div id="boot" class="login-wrap"><div><span class="loading"></span> &nbsp;loading…</div></div>
  <div class="toasts" id="toasts"></div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
