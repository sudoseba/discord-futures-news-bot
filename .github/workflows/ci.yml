name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run vitest
        env:
          DISCORD_TOKEN: dummy
        run: node ./node_modules/vitest/vitest.mjs run

      - name: Smoke-test module loading
        env:
          DISCORD_TOKEN: dummy
        run: |
          node -e "
            require('./src/services/database').initDatabase();
            require('./src/scheduler');
            require('./src/commands/scorecard');
            require('./src/commands/snooze');
            console.log('modules OK');
          "
